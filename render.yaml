services:
  - type: web
    name: croked-api
    runtime: python
    region: singapore  # Closest to India for low latency
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      - key: CORS_ORIGINS
        value: https://croked.vercel.app,http://localhost:3000
      - key: RATE_LIMIT
        value: "60/minute"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ANGELONE_API_KEY
        sync: false
      - key: ANGELONE_CLIENT_CODE
        sync: false
      - key: ANGELONE_PASSWORD
        sync: false
      - key: ANGELONE_TOTP_SECRET
        sync: false

